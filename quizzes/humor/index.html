<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humor DNA — MetaQuizzes</title>
  <link rel="stylesheet" href="../shared/ink-night.css" />
</head>
<body class="mq">
  <div class="mq-bg" aria-hidden="true"></div>

  <header class="mq-top">
    <a class="mq-brand" href="../index.html">MetaQuizzes</a>
    <span class="mq-quiz-label">Humor DNA</span>
  </header>

  <main class="mq-stage">
    <h1>What’s your Humor DNA?</h1>
    <p class="mq-lede">A 20-question visual quiz that maps your humor spectrum.</p>

    <div class="mq-progress">
      <div class="mq-progress-meta">
        <span class="mq-section-label">Progress</span>
        <span class="mq-progress-count" id="progressText">Question 1 / 20</span>
      </div>
      <div class="mq-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <span class="mq-progress-fill" id="progressFill"></span>
      </div>
    </div>

    <div class="mq-panel">
      <div id="quiz" class="mq-stage-inner"></div>

      <div class="mq-controls" id="controls">
        <button id="skipBtn" type="button" class="mq-btn-secondary" title="Skip this question">Skip</button>
        <button id="retakeBtn" type="button" class="mq-btn-secondary mq-hidden">Retake quiz</button>
      </div>

      <div id="result" class="mq-hidden"></div>

      <p class="mq-foot" id="tip">Tip: click any image to answer — your next question loads automatically.</p>
    </div>
  </main>

  <script src="../shared/quiz-ui.js"></script>

const quizEl = document.getElementById("quiz");
const resultEl = document.getElementById("result");
const skipBtn = document.getElementById("skipBtn");
const retakeBtn = document.getElementById("retakeBtn");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");
const tip = document.getElementById("tip");

let current = 0;
let scores = {DH:0,SH:0,WH:0,PH:0,WP:0,SA:0,SD:0,SU:0};
let locking = false;
const TOTAL_Q = quizData.length;

function updateProgress() {
  const shown = Math.min(current + 1, TOTAL_Q);
  progressText.textContent = current < TOTAL_Q
    ? `Question ${shown} / ${TOTAL_Q}`
    : `Finished — ${TOTAL_Q} / ${TOTAL_Q}`;
  const pct = Math.round((Math.min(current, TOTAL_Q) / TOTAL_Q) * 100);
  MQ.setProgress(progressFill, pct);
}

function renderQuestion() {
  if (current >= TOTAL_Q) return showResult();

  resultEl.classList.add("mq-hidden");
  retakeBtn.classList.add("mq-hidden");
  skipBtn.classList.remove("mq-hidden");
  tip.classList.remove("mq-hidden");
  locking = false;

  quizEl.innerHTML = "";
  const qData = quizData[current];

  const h2 = document.createElement("h2");
  h2.className = "mq-q-title";
  h2.style.textAlign = "center";
  h2.textContent = qData.q;
  quizEl.appendChild(h2);

  const grid = document.createElement("div");
  grid.className = "mq-option-grid";

  qData.options.forEach((opt) => {
    const card = document.createElement("div");
    card.className = "mq-option-card";
    card.setAttribute("role", "button");
    card.setAttribute("tabindex", "0");
    card.innerHTML =
      `<img src="${opt.img}" alt="${opt.label}" onerror="this.style.opacity='0.35'">
       <div class="mq-option-label">${opt.label}</div>`;
    const handle = () => selectAnswer(opt, card);
    card.addEventListener("click", handle);
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        handle();
      }
    });
    grid.appendChild(card);
  });

  quizEl.appendChild(grid);
  MQ.pulseEnter(quizEl);
  updateProgress();
}

function selectAnswer(opt, card) {
  if (locking) return;
  locking = true;
  card.classList.add("is-selected");
  opt.types.forEach((t) => {
    if (scores[t] != null) scores[t] += 1;
  });
  const delay = MQ.reducedMotion ? 0 : 220;
  window.setTimeout(() => {
    current += 1;
    renderQuestion();
  }, delay);
}

function buildShareText(userName, topCode, secondCode, sorted, total) {
  const top = HUMOR_PROFILES[topCode];
  const runner = secondCode ? HUMOR_PROFILES[secondCode] : null;
  const pct = (c) => Math.round((c / total) * 100);

  const lines = [];
  lines.push(`${userName ? userName + "’s" : "My"} Humor DNA`);
  lines.push(`Top: ${top.title} — “${top.tagline}”`);
  if (runner) lines.push(`Runner-up: ${runner.title}`);
  lines.push(
    "Spectrum: " +
      sorted
        .map(([k, v]) => `${HUMOR_PROFILES[k].title.split(" / ")[0]} ${pct(v)}%`)
        .join(" · ")
  );
  return lines.join("\n");
}

function createHumorProfile(opts) {
  const { userName = "Your", topCode, secondCode, curated } = opts;
  const top = HUMOR_PROFILES[topCode];
  const sec = secondCode ? HUMOR_PROFILES[secondCode] : null;
  const curatedExamples = curated || {
    primary: ["The Menu", "The Lobster", "Veep", "White Lotus"],
    secondary: ["Grand Budapest Hotel", "Jojo Rabbit", "Hacks", "Shrinking"],
    tertiary: ["Ted", "Game Night", "Silicon Valley"],
  };

  const profile = document.createElement("div");
  profile.className = "mq-profile";
  profile.innerHTML = `
    <p class="mq-eyebrow">Profile</p>
    <h3>${userName} Humor DNA</h3>
    <p class="mq-tagline">“${top.tagline}”</p>
    <div class="mq-chip-row">
      <span class="mq-chip">${top.title}</span>
      ${sec ? `<span class="mq-chip">Runner-up: ${sec.title}</span>` : ""}
    </div>
    <div class="mq-profile-grid">
      <div class="mq-profile-block">
        <h4>Core read</h4>
        <p>${top.desc}</p>
        ${
          sec
            ? `<p style="margin-top:0.5rem">You also score highly on <strong>${sec.title}</strong>, which blends into your primary style when the jokes punch up.</p>`
            : ""
        }
      </div>
      <div class="mq-profile-block">
        <h4>Pop-culture compass</h4>
        <dl class="mq-kv">
          <dt>Primary</dt><dd>${curatedExamples.primary.join(" · ")}</dd>
          <dt>Secondary</dt><dd>${curatedExamples.secondary.join(" · ")}</dd>
          <dt>Tertiary</dt><dd>${curatedExamples.tertiary.join(" · ")}</dd>
        </dl>
      </div>
    </div>
    <div class="mq-actions" style="margin-top:1rem">
      <button type="button" id="copySummaryBtn">Copy summary</button>
      <button type="button" class="mq-btn-secondary" id="scrollTopBtn">Scroll to top</button>
    </div>`;

  profile.querySelector("#copySummaryBtn").onclick = async () => {
    const btn = profile.querySelector("#copySummaryBtn");
    try {
      const txt = buildShareText(
        userName.replace(/’s$/, ""),
        topCode,
        secondCode,
        opts.sorted,
        opts.total
      );
      await navigator.clipboard.writeText(txt);
      btn.textContent = "Copied!";
      setTimeout(() => (btn.textContent = "Copy summary"), 1200);
    } catch (e) {
      btn.textContent = "Copy failed";
      setTimeout(() => (btn.textContent = "Copy summary"), 1200);
    }
  };
  profile.querySelector("#scrollTopBtn").onclick = () =>
    window.scrollTo({ top: 0, behavior: "smooth" });

  return profile;
}

function showResult() {
  quizEl.innerHTML = "";
  resultEl.classList.remove("mq-hidden");
  skipBtn.classList.add("mq-hidden");
  tip.classList.add("mq-hidden");

  const entries = Object.entries(scores);
  const total = entries.reduce((s, [, v]) => s + v, 0) || 1;
  const sorted = entries.sort((a, b) => b[1] - a[1]);
  const [topCode, topScore] = sorted[0];
  const second = sorted[1] || [null, 0];

  const wrap = document.createElement("div");
  wrap.className = "mq-results is-visible";
  wrap.style.display = "block";

  const prof = HUMOR_PROFILES[topCode];
  const pctTop = Math.round((topScore / total) * 100);

  const top = document.createElement("div");
  top.className = "mq-result-hero";
  top.innerHTML = `
    <p class="mq-eyebrow">Your dominant humor type</p>
    <h3>${prof.title}</h3>
    <p class="mq-tagline">“${prof.tagline}”</p>
    <p>${prof.desc}</p>
    <div class="mq-chip-row">
      <span class="mq-chip"><strong>People:</strong> ${prof.people.join(", ")}</span>
      <span class="mq-chip"><strong>Pop culture:</strong> ${prof.pop.join(", ")}</span>
    </div>
    <p class="mq-muted" style="margin:0.65rem 0 0">Top score: ${pctTop}% (${topScore} of ${total} points)</p>`;
  wrap.appendChild(top);

  if (second[1] > 0) {
    const diff = topScore - second[1];
    const close = diff <= Math.max(2, Math.ceil(0.08 * total));
    if (close) {
      const r = HUMOR_PROFILES[second[0]];
      const pct2 = Math.round((second[1] / total) * 100);
      const runner = document.createElement("div");
      runner.className = "mq-result-hero";
      runner.innerHTML = `
        <p class="mq-eyebrow">Runner-up (strong secondary)</p>
        <h3>${r.title}</h3>
        <p class="mq-tagline">“${r.tagline}”</p>
        <p>${r.desc}</p>
        <p class="mq-muted" style="margin:0.65rem 0 0">Score: ${pct2}% (${second[1]} of ${total})</p>`;
      wrap.appendChild(runner);
    }
  }

  const header = document.createElement("h3");
  header.className = "mq-subsection-title";
  header.style.marginTop = "1.25rem";
  header.textContent = "Your humor spectrum";
  wrap.appendChild(header);

  const list = document.createElement("div");
  list.className = "mq-rank-list";

  sorted.forEach(([code, val], i) => {
    const pct = Math.round((val / total) * 100);
    const row = document.createElement("div");
    row.className = "mq-rank-row" + (i === 0 ? " is-top" : "");
    row.innerHTML = `
      <div class="mq-rank-name">${HUMOR_PROFILES[code].title}</div>
      <div class="mq-rank-track"><span class="mq-rank-fill" data-width="${pct}%"></span></div>
      <div class="mq-rank-pct">${pct}%</div>`;
    list.appendChild(row);
  });
  wrap.appendChild(list);

  wrap.appendChild(
    createHumorProfile({
      userName: "Your",
      topCode,
      secondCode: second[0],
      sorted,
      total,
      curated: {
        primary: ["The Menu", "The Lobster", "Veep", "White Lotus"],
        secondary: ["Grand Budapest Hotel", "Jojo Rabbit", "Hacks", "Shrinking"],
        tertiary: ["Ted", "Game Night", "Silicon Valley"],
      },
    })
  );

  retakeBtn.classList.remove("mq-hidden");
  retakeBtn.onclick = () => {
    current = 0;
    scores = { DH: 0, SH: 0, WH: 0, PH: 0, WP: 0, SA: 0, SD: 0, SU: 0 };
    MQ.setProgress(progressFill, 0);
    resultEl.classList.add("mq-hidden");
    updateProgress();
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  resultEl.innerHTML = "";
  resultEl.appendChild(wrap);
  MQ.staggerReveal(list);
  updateProgress();
}

skipBtn.addEventListener("click", () => {
  if (locking) return;
  current += 1;
  renderQuestion();
});

renderQuestion();
  </script>
